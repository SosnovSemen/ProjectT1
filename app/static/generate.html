<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генерация/Обезличивание данных | Генератор</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Генерация</h1>
    </div>

    <div class="card">
        <div class="card-title">Конфигурация полей</div>
        <div id="fieldsContainer"></div>
        <button class="btn-add" id="addFieldBtn">+ Добавить поле</button>
    </div>



    <div class="card">
        <div class="card-title">Параметры</div>
        <div class="input-group">
            <div class="input-field">
                <label>Количество строк</label>
                <input type="number" id="rowsCount" value="5" min="1">
            </div>
            <button class="btn-primary" id="generateBtn">Сгенерировать</button>
        </div>
    </div>


    <div class="card" id="resultCard" style="display: none;">
        <div class="result-header">
            <div class="card-title" style="margin-bottom: 0;">Результат ( Первые 5 строк таблицы )</div>
            <div class="download-buttons">
                <button class="btn-download" id="downloadCsvBtn" style="display: none;">Скачать CSV</button>
                <button class="btn-download" id="downloadJsonBtn" style="display: none;">Скачать JSON</button>
            </div>
        </div>
        <div id="resultArea"></div>
    </div>
</div>
<script src="/static/generation.js"></script>
</body>
</html>
